name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Serialize deploys to the same ref so two runs never update the Cloud Run
# service concurrently (which aborts with a version conflict). Runs queue and
# execute one at a time instead of racing.
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push-deploy:
    name: Build, Push, and Deploy to Cloud Run
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v7

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Step 3: Cache npm
      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Step 4: Install Frontend Dependencies
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      # Step 5: Build Frontend
      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      # Step 6: Authenticate with Google Cloud
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # Step 7: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 8: Generate image tag
      - name: Get Short SHA
        id: slug
        run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

      # Step 9: Build and Push Docker Images
      - name: Build and Push Docker Images
        run: |
          export IMAGE_TAG=${{ steps.slug.outputs.sha8 }}

          # Build and push Frontend to Google Container Registry
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/frontend:$IMAGE_TAG -f docker/Dockerfile.lfsd .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/frontend:$IMAGE_TAG

          # Vendor the portable responsible_ai package into the backend build
          # context so the app can import it (canonical copy is the installable
          # distribution under packages/responsible-ai/).
          rm -rf backend/responsible_ai
          cp -r packages/responsible-ai/responsible_ai backend/responsible_ai

          # Build and push Backend to Google Container Registry
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/backend:$IMAGE_TAG -f backend/Dockerfile backend
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/backend:$IMAGE_TAG

          # Tag and push Frontend to Docker Hub
          docker tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/frontend:$IMAGE_TAG hamoum/lfsd:latest
          docker push hamoum/lfsd:latest

      # Step 10: Deploy Backend to Cloud Run
      - name: Deploy Backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: lfsd-backend
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/backend:${{ steps.slug.outputs.sha8 }}
          region: us-central1

      # Step 11: Deploy Frontend to Cloud Run
      - name: Deploy Frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: lfsd-frontend
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/frontend:${{ steps.slug.outputs.sha8 }}
          region: us-central1
          flags: "--port=5000"

      # Step 12: Print deployment URLs
      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Deployment complete!"
          echo "Backend:  https://lfsd-backend-692544481281.us-central1.run.app"
          echo "Frontend: https://lfsd-frontend-692544481281.us-central1.run.app"
