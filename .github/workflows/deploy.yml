name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy to Cloud Run (${{ inputs.environment }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Get latest image tag
        id: latest
        run: |
          echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Deploy Backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: lfsd-backend
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/backend:${{ steps.latest.outputs.sha8 }}
          region: us-central1

      - name: Deploy Frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: lfsd-frontend
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/frontend:${{ steps.latest.outputs.sha8 }}
          region: us-central1
          flags: "--port=5000"

      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Deployed to ${{ inputs.environment }}!"
          echo "Backend:  https://lfsd-backend-692544481281.us-central1.run.app"
          echo "Frontend: https://lfsd-frontend-692544481281.us-central1.run.app"
