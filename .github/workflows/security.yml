name: Security Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security:
    name: Run Security Audits
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit (Python Code Security Linter)
        # -r: Run recursively
        # -ll: Report medium and high severity findings
        # -ii: Report medium and high confidence findings
        run: |
          bandit -r backend/ -ll -ii

      - name: Run Safety (Dependency Vulnerability Scanner)
        # Scans backend/requirements.txt for known package vulnerabilities.
        # continue-on-error is set to prevent pipeline blocks from minor or non-critical package warnings.
        run: |
          safety check -r backend/requirements.txt
        continue-on-error: true
