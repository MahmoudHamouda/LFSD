server {
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Backend
    location /api/ {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app;
        proxy_ssl_server_name on;
    }
    
    # Proxy Root Level Routes (based on vite.config.ts)
    location /conversation {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/conversation;
        proxy_ssl_server_name on;
    }
    location /history {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/history;
        proxy_ssl_server_name on;
    }
    location /.auth {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/.auth;
        proxy_ssl_server_name on;
    }
    location /frontend_settings {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/frontend_settings;
        proxy_ssl_server_name on;
    }
    location /user {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/user;
        proxy_ssl_server_name on;
    }
    location /partners {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/partners;
        proxy_ssl_server_name on;
    }
    location /mobility {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/mobility;
        proxy_ssl_server_name on;
    }
}
