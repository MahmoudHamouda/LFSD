server {
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Backend
    # Proxy API requests to Backend (matches /api/...)
    location /api/ {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app;
        proxy_ssl_server_name on;
    }
    
    # Authenticated User (Azure SWA style -> Backend Auth0)
    location /.auth/ {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/api/auth/;
        proxy_ssl_server_name on;
    }

    # History Routes (Direct match)
    location /history {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/history;
        proxy_ssl_server_name on;
    }

    # User Routes (/user -> /api/user)
    location /user {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/api/user;
        proxy_ssl_server_name on;
    }

    # Partners Routes (/partners -> /api/partners - Wait, app.py has partners under /partners? No, let's check. 
    # Checking app.py content from memory: "app.include_router(mobility_routes.router, prefix='/api')" -> /api/mobility
    # "app.include_router(api_routes_goals.router, prefix='/api')"
    # I don't see 'partners' explicitly in app.py snippet I viewed. 
    # But /mobility -> /api/mobility.
    
    location /mobility {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/api/mobility;
        proxy_ssl_server_name on;
    }

    # Fallback for /conversation if needed (though API mismatch might persist)
    location /conversation {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/conversation; 
        proxy_ssl_server_name on;
    }

    location /frontend_settings {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/frontend_settings;
        proxy_ssl_server_name on;
    }
}
