server {
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Backend
    location /api/ {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app;
        proxy_ssl_server_name on;
        proxy_set_header Host lfsd-backend-692544481281.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Authenticated User (Azure SWA style -> Backend Auth0)
    location /.auth/ {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/api/auth/;
        proxy_ssl_server_name on;
        proxy_set_header Host lfsd-backend-692544481281.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # History Routes
    location /history {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/history;
        proxy_ssl_server_name on;
        proxy_set_header Host lfsd-backend-692544481281.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # User Routes
    location /user {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/api/user;
        proxy_ssl_server_name on;
        proxy_set_header Host lfsd-backend-692544481281.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Mobility Routes
    location /mobility {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/api/mobility;
        proxy_ssl_server_name on;
        proxy_set_header Host lfsd-backend-692544481281.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Conversation Routes
    location /conversation {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/conversation;
        proxy_ssl_server_name on;
        proxy_set_header Host lfsd-backend-692544481281.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend Settings
    location /frontend_settings {
        proxy_pass https://lfsd-backend-692544481281.us-central1.run.app/frontend_settings;
        proxy_ssl_server_name on;
        proxy_set_header Host lfsd-backend-692544481281.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
